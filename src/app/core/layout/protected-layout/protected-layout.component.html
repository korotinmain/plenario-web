<mat-sidenav-container class="app-container">
  <mat-sidenav class="app-sidebar" mode="side" opened [fixedInViewport]="true">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="sidebar-logo">Plenario</span>
        <span class="brand-tagline">Personal planner</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav" aria-label="Main navigation">
      @for (item of navItems; track item.route) {
        @if (item.sectionLabel) {
          <div class="nav-section-label">{{ item.sectionLabel }}</div>
        }
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
          matRipple
          [matRippleColor]="'rgba(165,180,252,0.08)'"
          [attr.aria-label]="item.label"
        >
          <span class="nav-item__icon-wrap">
            <mat-icon class="nav-item__icon">{{ item.icon }}</mat-icon>
          </span>
          <span class="nav-item__label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- User footer -->
    <div class="sidebar-footer">
      @if (user()) {
        <div class="user-row">
          <div class="user-avatar" [attr.aria-label]="user()!.email">
            {{ userInitials }}
          </div>
          <div class="user-info">
            <span class="user-name">{{ user()!.name ?? user()!.email }}</span>
            @if (user()!.name) {
              <span class="user-email">{{ user()!.email }}</span>
            }
          </div>
        </div>
      }
      <button
        class="logout-btn"
        mat-icon-button
        matTooltip="Sign out"
        (click)="logout()"
        aria-label="Sign out"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </div>

  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <main class="content-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
